name: Dependency Audit

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install audit tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit safety
      - name: Show what would be fixed (dry run)
        run: |
          echo "=== pip-audit dry run with --fix ==="
          pip-audit -r requirements.txt --fix --dry-run || echo "Dry run completed"
      - name: Run pip-audit
        run: |
          pip-audit -r requirements.txt --format=json --output=pip-audit-report.json || true
          pip-audit -r requirements.txt --format=csv --output=pip-audit-report.csv || true
      - name: Run Safety check
        run: |
          safety check --output=json > safety-report.json || true
          safety check --output=text > safety-report.txt || true
      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-reports-${{ github.run_number }}
          path: |
            pip-audit-report.json
            pip-audit-report.csv
            safety-report.json
            safety-report.txt
          retention-days: 90

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1e"/>
    </radialGradient>
    <radialGradient id="face" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#f0d5b8"/>
      <stop offset="100%" stop-color="#ddb894"/>
    </radialGradient>
  </defs>
  <circle cx="60" cy="60" r="58" fill="url(#bg)" stroke="#ab47bc" stroke-width="2.5"/>
  <!-- Lab coat -->
  <rect x="24" y="84" width="72" height="34" rx="8" fill="#f5f5f5"/>
  <ellipse cx="60" cy="84" rx="28" ry="8" fill="#f5f5f5"/>
  <!-- Pocket with pen -->
  <rect x="66" y="88" width="10" height="12" rx="2" fill="#e0e0e0" stroke="#bbb" stroke-width="0.8"/>
  <line x1="69" y1="88" x2="69" y2="100" stroke="#ab47bc" stroke-width="1.5"/>
  <line x1="72" y1="88" x2="72" y2="100" stroke="#5c6bc0" stroke-width="1.5"/>
  <!-- Head -->
  <ellipse cx="60" cy="52" rx="22" ry="24" fill="url(#face)"/>
  <!-- Hair - short neat -->
  <ellipse cx="60" cy="33" rx="22" ry="9" fill="#2c1810"/>
  <rect x="38" y="33" width="44" height="8" fill="#2c1810"/>
  <!-- Glasses -->
  <circle cx="51" cy="50" r="6" fill="none" stroke="#444" stroke-width="1.8"/>
  <circle cx="69" cy="50" r="6" fill="none" stroke="#444" stroke-width="1.8"/>
  <line x1="57" y1="50" x2="63" y2="50" stroke="#444" stroke-width="1.5"/>
  <line x1="45" y1="50" x2="41" y2="51" stroke="#444" stroke-width="1.5"/>
  <line x1="75" y1="50" x2="79" y2="51" stroke="#444" stroke-width="1.5"/>
  <!-- Eyes -->
  <circle cx="51" cy="50" r="2.5" fill="#2d4a7a"/>
  <circle cx="69" cy="50" r="2.5" fill="#2d4a7a"/>
  <circle cx="52" cy="49.5" r="0.8" fill="#fff"/>
  <circle cx="70" cy="49.5" r="0.8" fill="#fff"/>
  <!-- Nose -->
  <path d="M58 55 Q60 59 62 55" stroke="#c47a50" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Warm smile -->
  <path d="M52 63 Q60 69 68 63" stroke="#c47a50" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Book/journal in hand area -->
  <rect x="26" y="88" width="20" height="24" rx="2" fill="#5c6bc0"/>
  <rect x="27" y="89" width="18" height="22" rx="1" fill="#3949ab"/>
  <!-- Pages -->
  <line x1="30" y1="93" x2="42" y2="93" stroke="#9fa8da" stroke-width="1"/>
  <line x1="30" y1="96" x2="42" y2="96" stroke="#9fa8da" stroke-width="1"/>
  <line x1="30" y1="99" x2="42" y2="99" stroke="#9fa8da" stroke-width="1"/>
  <line x1="30" y1="102" x2="38" y2="102" stroke="#9fa8da" stroke-width="1"/>
  <!-- DNA helix decoration -->
  <path d="M80 86 Q84 90 80 94 Q76 98 80 102 Q84 106 80 110" stroke="#ab47bc" stroke-width="1.5" fill="none"/>
  <path d="M86 86 Q82 90 86 94 Q90 98 86 102 Q82 106 86 110" stroke="#7e57c2" stroke-width="1.5" fill="none"/>
  <line x1="80" y1="88" x2="86" y2="90" stroke="#ce93d8" stroke-width="1"/>
  <line x1="80" y1="94" x2="86" y2="96" stroke="#ce93d8" stroke-width="1"/>
  <line x1="80" y1="100" x2="86" y2="102" stroke="#ce93d8" stroke-width="1"/>
  <line x1="80" y1="106" x2="86" y2="108" stroke="#ce93d8" stroke-width="1"/>
</svg>

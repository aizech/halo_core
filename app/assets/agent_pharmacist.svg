<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1f2d1f"/>
      <stop offset="100%" stop-color="#121e12"/>
    </radialGradient>
    <radialGradient id="face" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#f5c5a3"/>
      <stop offset="100%" stop-color="#e8a87c"/>
    </radialGradient>
  </defs>
  <circle cx="60" cy="60" r="58" fill="url(#bg)" stroke="#66bb6a" stroke-width="2.5"/>
  <!-- White coat -->
  <rect x="24" y="84" width="72" height="34" rx="8" fill="#f5f5f5"/>
  <ellipse cx="60" cy="84" rx="28" ry="8" fill="#f5f5f5"/>
  <!-- Green scrub underneath -->
  <rect x="50" y="84" width="20" height="22" rx="2" fill="#43a047"/>
  <!-- Head -->
  <ellipse cx="60" cy="52" rx="22" ry="24" fill="url(#face)"/>
  <!-- Hair -->
  <ellipse cx="60" cy="33" rx="22" ry="9" fill="#5d3a1a"/>
  <rect x="38" y="33" width="44" height="8" fill="#5d3a1a"/>
  <!-- Curved hair -->
  <path d="M38 37 Q60 30 82 37" fill="#5d3a1a"/>
  <!-- Eyes -->
  <ellipse cx="52" cy="50" rx="3.5" ry="4" fill="#fff"/>
  <ellipse cx="68" cy="50" rx="3.5" ry="4" fill="#fff"/>
  <circle cx="53" cy="51" r="2.2" fill="#2d5a2d"/>
  <circle cx="69" cy="51" r="2.2" fill="#2d5a2d"/>
  <circle cx="54" cy="50" r="0.8" fill="#fff"/>
  <circle cx="70" cy="50" r="0.8" fill="#fff"/>
  <!-- Eyebrows -->
  <path d="M48 45 Q52 43 56 45" stroke="#5d3a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M64 45 Q68 43 72 45" stroke="#5d3a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M58 55 Q60 59 62 55" stroke="#c47a50" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Big friendly smile -->
  <path d="M51 62 Q60 70 69 62" stroke="#c47a50" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Pill bottle in hand area -->
  <rect x="76" y="88" width="12" height="18" rx="5" fill="#66bb6a"/>
  <rect x="75" y="86" width="14" height="5" rx="2" fill="#43a047"/>
  <!-- Rx symbol on bottle -->
  <text x="82" y="100" text-anchor="middle" font-size="9" fill="#fff" font-weight="bold">Rx</text>
  <!-- Pills scattered -->
  <ellipse cx="34" cy="97" rx="5" ry="3" fill="#ef5350" opacity="0.85"/>
  <ellipse cx="34" cy="97" rx="5" ry="1" fill="#c62828" opacity="0.5"/>
  <ellipse cx="40" cy="104" rx="3" ry="5" fill="#7e57c2" opacity="0.85" transform="rotate(30 40 104)"/>
  <!-- Molecule atom small decoration -->
  <circle cx="28" cy="108" r="3" fill="none" stroke="#66bb6a" stroke-width="1.2"/>
  <circle cx="35" cy="112" r="2" fill="none" stroke="#66bb6a" stroke-width="1.2"/>
  <line x1="31" y1="108" x2="33" y2="112" stroke="#66bb6a" stroke-width="1"/>
</svg>

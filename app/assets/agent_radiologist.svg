<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2a2a"/>
      <stop offset="100%" stop-color="#0d1a1a"/>
    </radialGradient>
    <radialGradient id="face" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#f0d5b8"/>
      <stop offset="100%" stop-color="#ddb894"/>
    </radialGradient>
  </defs>
  <circle cx="60" cy="60" r="58" fill="url(#bg)" stroke="#4fc3f7" stroke-width="2.5"/>
  <!-- Lab coat body -->
  <rect x="24" y="84" width="72" height="34" rx="8" fill="#eceff1"/>
  <ellipse cx="60" cy="84" rx="28" ry="8" fill="#eceff1"/>
  <!-- Coat details -->
  <rect x="54" y="85" width="12" height="18" rx="2" fill="#b0bec5"/>
  <!-- Head -->
  <ellipse cx="60" cy="52" rx="22" ry="24" fill="url(#face)"/>
  <!-- Hair dark -->
  <ellipse cx="60" cy="33" rx="22" ry="9" fill="#4a3728"/>
  <rect x="38" y="33" width="44" height="8" fill="#4a3728"/>
  <!-- Glasses frames -->
  <rect x="44" y="46" width="14" height="10" rx="4" fill="none" stroke="#555" stroke-width="1.8"/>
  <rect x="62" y="46" width="14" height="10" rx="4" fill="none" stroke="#555" stroke-width="1.8"/>
  <line x1="58" y1="51" x2="62" y2="51" stroke="#555" stroke-width="1.5"/>
  <line x1="44" y1="51" x2="40" y2="52" stroke="#555" stroke-width="1.5"/>
  <line x1="76" y1="51" x2="80" y2="52" stroke="#555" stroke-width="1.5"/>
  <!-- Eyes inside glasses -->
  <circle cx="51" cy="51" r="2" fill="#2d4a7a"/>
  <circle cx="69" cy="51" r="2" fill="#2d4a7a"/>
  <circle cx="52" cy="50.5" r="0.7" fill="#fff"/>
  <circle cx="70" cy="50.5" r="0.7" fill="#fff"/>
  <!-- Nose -->
  <path d="M58 55 Q60 59 62 55" stroke="#c47a50" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Smile -->
  <path d="M52 63 Q60 69 68 63" stroke="#c47a50" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- X-ray lightbox on chest area -->
  <rect x="34" y="88" width="26" height="18" rx="3" fill="#1a2a3a" stroke="#4fc3f7" stroke-width="1"/>
  <!-- Spine/vertebrae on xray -->
  <rect x="45" y="91" width="5" height="3" rx="1" fill="#4fc3f7" opacity="0.7"/>
  <rect x="45" y="96" width="5" height="3" rx="1" fill="#4fc3f7" opacity="0.7"/>
  <rect x="45" y="101" width="5" height="3" rx="1" fill="#4fc3f7" opacity="0.7"/>
  <line x1="47" y1="91" x2="47" y2="107" stroke="#4fc3f7" stroke-width="0.8" opacity="0.5"/>
  <!-- Pointer/stylus -->
  <line x1="62" y1="86" x2="55" y2="99" stroke="#EA9216" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="62" cy="86" r="2" fill="#EA9216"/>
</svg>
